name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    permissions:
      contents: read
    uses: S-mishina/reusable-workflows/.github/workflows/go-lint.yml@main
    with:
      golangci-lint-version: v1.61
      args: --timeout=5m

  build:
    permissions:
      contents: read
    uses: S-mishina/reusable-workflows/.github/workflows/go-build.yml@main

  test:
    permissions:
      contents: read
      pull-requests: write
    uses: S-mishina/reusable-workflows/.github/workflows/go-test.yml@main
    with:
      pr-comment: true
      upload-coverage: true

  e2e:
    if: github.event_name == 'pull_request'
    name: E2E Test
    uses: ./.github/workflows/e2e-test.yml

  security:
    permissions:
      contents: read
      security-events: write
    uses: S-mishina/reusable-workflows/.github/workflows/trivy-scan.yml@main
