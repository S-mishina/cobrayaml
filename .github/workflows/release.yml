name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft'
        required: false
        type: boolean
        default: true

jobs:
  release:
    permissions:
      contents: write
      packages: write
    uses: S-mishina/reusable-workflows/.github/workflows/release.yml@main
    with:
      version: ${{ inputs.version }}
      prerelease: ${{ inputs.prerelease }}
      draft: ${{ inputs.draft }}
      install-instructions: "go get github.com/S-mishina/cobrayaml@${VERSION}"
